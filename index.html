<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jeswanth Admin</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:Inter;background:#f3f4f6}

/* LOGIN */
#login{height:100vh;display:flex;justify-content:center;align-items:center;background:#111}
.box{background:#fff;padding:30px;border-radius:12px;width:300px}
input{width:100%;padding:10px;margin:8px 0;border:1px solid #ddd;border-radius:6px}
button{width:100%;padding:10px;background:#800020;color:#fff;border:none;border-radius:6px;font-weight:700;cursor:pointer}

/* APP */
#app{display:none}
.top{background:#131921;color:#fff;padding:12px;font-weight:700}
.container{padding:15px}

/* CARDS */
.card{background:#fff;padding:15px;border-radius:10px;margin-bottom:10px}
.stat{display:flex;justify-content:space-between;font-weight:700}

/* PRODUCTS */
.product{display:flex;gap:10px;background:#fff;padding:10px;border-radius:10px;margin-bottom:10px}
.product img{width:70px;height:70px;border-radius:8px;object-fit:cover}
.name{font-weight:700}
.price{color:#800020;font-weight:800}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="box">
    <h3>Admin Login</h3>
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="top">Jeswanth Admin Panel</div>

  <div class="container">

    <!-- STATS -->
    <div class="card">
      <div class="stat">Products <span id="pcount">0</span></div>
      <div class="stat">Orders <span id="ocount">0</span></div>
      <div class="stat">Revenue <span id="rev">₹0</span></div>
    </div>

    <!-- SETTINGS -->
    <div class="card">
      <input id="sheet" placeholder="Paste Google Sheet URL">
      <button onclick="saveSheet()">Save Sheet</button>
    </div>

    <!-- PRODUCTS -->
    <div id="products"></div>

  </div>
</div>

<script>

// ===== DATA =====
let products = [];
let orders = [];

// ===== LOGIN =====
function login(){
  if(document.getElementById('user').value==='admin' &&
     document.getElementById('pass').value==='admin123'){
    document.getElementById('login').style.display='none';
    document.getElementById('app').style.display='block';
    load();
  }
}

// ===== LOAD =====
function load(){
  let url = localStorage.getItem("sheet");

  if(!url){
    demo();
    return;
  }

  fetch(url)
  .then(r=>r.json())
  .then(d=>{
    products = d.products || d || [];
    render();
  })
  .catch(()=>{
    demo();
  });
}

// ===== DEMO =====
function demo(){
  products = [
    {name:"Shirt",price:499,images:["https://via.placeholder.com/150"]},
    {name:"Jeans",price:899,images:["https://via.placeholder.com/150"]}
  ];
  render();
}

// ===== RENDER =====
function render(){
  document.getElementById("pcount").innerText = products.length;

  document.getElementById("products").innerHTML =
    products.map(p=>`
      <div class="product">
        <img src="${p.images?.[0]||''}">
        <div>
          <div class="name">${p.name}</div>
          <div class="price">₹${p.price}</div>
        </div>
      </div>
    `).join("");
}

// ===== SAVE SHEET =====
function saveSheet(){
  const url = document.getElementById("sheet").value;
  localStorage.setItem("sheet", url);
  alert("Saved");
  load();
}

</script>

</body>
</html>
